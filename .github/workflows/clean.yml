name: Clean Up Docker Images
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'  # Every Sunday at 3 AM

permissions:
  packages: write
  contents: read

jobs:
  clean:
    runs-on: ubuntu-latest
    name: Delete old test images
    steps:
      - uses: snok/container-retention-policy@v3.0.0
        with:
          account: ${{ github.repository_owner }}
          account-type: org
          token: ${{ secrets.PAT }}  # Personal Access Token with appropriate permissions
          image-names: "*"
          image-tags: "!latest"  # target any image that has a tag starting with the word test or dev
          cut-off: 1w # retain images newer than 1 week
          keep-n-most-recent: 2 # keep the 2 most recent images regardless of age
